name: Force GitHub Pages rebuild

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write

concurrency:
  group: github-pages-rebuild
  cancel-in-progress: false

jobs:
  request-build:
    runs-on: ubuntu-latest
    steps:
      - name: Request a new Pages build from the configured source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds"
